<!DOCTYPE html>
<html>
<head>
    <title>Countdown Timer</title>
    <style>
        .countdown {
            font-size: 2em;
            color: #ff0000; /* Red for urgency */
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="countdown" class="countdown"></div>
    <script>
        function calculateBusinessDays(startDate, endDate) {
            let count = 0;
            let currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) { // 0 = Sunday, 6 = Saturday
                    count++;
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return count;
        }

        const startDate = new Date('2024-02-26'); // Replace with the original countdown start date
        const endDate = new Date('2026-05-22'); // 525 business days after start
        const businessDaysLeft = calculateBusinessDays(new Date(), endDate);

        document.getElementById('countdown').innerHTML = `Days left: ${businessDaysLeft}`;
    </script>
</body>
</html>
